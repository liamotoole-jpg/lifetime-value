services:
  - type: web
    name: conduit-processor
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  - type: cron
    name: cleanup-conduit-uploads
    env: python
    plan: free
    schedule: "0 5 * * *" 
    buildCommand: pip install -r requirements.txt
    startCommand: python cleanup_uploads.py
